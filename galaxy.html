<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy Generator — NEXUS Lab</title>
  <meta name="description" content="Procedurally generated spiral galaxies with 10,000 stars. Part of NEXUS Experiment Lab by RimanTech." />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #000005;
      color: #f1f5f9;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: rgba(0,0,5,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 10;
      flex-shrink: 0;
    }
    .back { text-decoration: none; color: #475569; font-size: 13px; transition: color 0.2s; }
    .back:hover { color: #f1f5f9; }
    .brand { font-size: 16px; font-weight: 700; letter-spacing: 3px; }
    .brand span { color: #c084fc; }
    .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #94a3b8;
      padding: 6px 16px;
      border-radius: 50px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover {
      border-color: rgba(192,132,252,0.5);
      color: #c084fc;
      background: rgba(192,132,252,0.1);
    }
    .btn.active {
      background: linear-gradient(135deg, #c084fc, #a78bfa);
      border-color: transparent;
      color: white;
    }
    #galaxyCanvas { flex: 1; display: block; cursor: grab; }
    #galaxyCanvas:active { cursor: grabbing; }
    .hud {
      position: absolute;
      bottom: 20px; left: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #475569;
      line-height: 2;
      background: rgba(0,0,5,0.7);
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .hud span { color: #c084fc; }
    .legend {
      position: absolute;
      top: 72px; right: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #475569;
      background: rgba(0,0,5,0.7);
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      line-height: 2.2;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="back">← NEXUS</a>
    <div class="brand">GALAXY <span>GEN</span></div>
    <div class="controls">
      <button class="btn" onclick="newGalaxy()">New Galaxy ✦</button>
      <button class="btn" id="typeBtn" onclick="cycleType()">Spiral</button>
      <button class="btn" id="starsBtn" onclick="cycleStars()">Stars: 10K</button>
      <button class="btn" onclick="toggleNebula()">Nebulae: On</button>
      <button class="btn active" onclick="resetView()">Reset View</button>
    </div>
  </nav>

  <canvas id="galaxyCanvas"></canvas>

  <div class="hud">
    Stars: <span id="starCount">10,000</span><br/>
    FPS: <span id="fps">60</span><br/>
    Zoom: <span id="zoomDisplay">1.0x</span><br/>
    Rotation: <span id="rotDisplay">0°</span>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#fff;box-shadow:0 0 6px #fff"></div> Main Sequence</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fbbf24;box-shadow:0 0 6px #fbbf24"></div> Giant Stars</div>
    <div class="legend-item"><div class="legend-dot" style="background:#60a5fa;box-shadow:0 0 6px #60a5fa"></div> Blue Dwarfs</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f472b6;box-shadow:0 0 6px #f472b6"></div> Red Giants</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c084fc;opacity:0.4"></div> Nebulae</div>
  </div>

  <script>
  const canvas = document.getElementById('galaxyCanvas');
  const ctx = canvas.getContext('2d');

  let W, H;
  let stars = [];
  let nebulaPoints = [];
  let showNebula = true;
  let galaxyType = 'spiral';
  const types = ['spiral', 'elliptical', 'irregular', 'barred'];
  let typeIdx = 0;
  const starCounts = [5000, 10000, 20000];
  let starCountIdx = 1;
  let starN = 10000;

  let viewX = 0, viewY = 0, viewZoom = 1;
  let dragStart = null, isDragging = false;
  let rotation = 0;

  const STAR_TYPES = [
    { color: '#ffffff', weight: 50, size: [0.5, 1.5], glow: '#ffffff' },
    { color: '#fbbf24', weight: 15, size: [1.5, 3.5], glow: '#fbbf24' },
    { color: '#60a5fa', weight: 20, size: [0.5, 1.2], glow: '#60a5fa' },
    { color: '#f472b6', weight: 10, size: [2, 4], glow: '#f472b6' },
    { color: '#e2e8f0', weight: 5, size: [0.3, 0.8], glow: '#e2e8f0' },
  ];

  function weightedStarType() {
    const total = STAR_TYPES.reduce((a, b) => a + b.weight, 0);
    let r = Math.random() * total;
    for (const t of STAR_TYPES) {
      r -= t.weight;
      if (r <= 0) return t;
    }
    return STAR_TYPES[0];
  }

  function rand(a, b) { return Math.random() * (b - a) + a; }

  function generateGalaxy() {
    stars = [];
    nebulaPoints = [];

    const cx = 0, cy = 0;
    const maxR = Math.min(W, H) * 0.38;
    const arms = galaxyType === 'barred' ? 2 : galaxyType === 'irregular' ? 0 : 3;
    const armSpread = galaxyType === 'elliptical' ? 1.5 : 0.3;

    for (let i = 0; i < starN; i++) {
      let x, y, r, angle;
      const st = weightedStarType();

      if (galaxyType === 'spiral' || galaxyType === 'barred') {
        const arm = Math.floor(Math.random() * (arms || 1));
        r = Math.pow(Math.random(), 0.6) * maxR;
        const tightness = galaxyType === 'barred' ? 0.015 : 0.025;
        angle = arm * (Math.PI * 2 / arms) + r * tightness * 1.8 + rand(-armSpread, armSpread);
        if (galaxyType === 'barred' && r < maxR * 0.25) {
          // Bar structure
          x = rand(-maxR * 0.25, maxR * 0.25);
          y = rand(-maxR * 0.04, maxR * 0.04);
        } else {
          x = Math.cos(angle) * r + rand(-maxR * 0.03, maxR * 0.03);
          y = Math.sin(angle) * r * 0.5 + rand(-maxR * 0.02, maxR * 0.02);
        }
      } else if (galaxyType === 'elliptical') {
        const theta = rand(0, Math.PI * 2);
        r = Math.pow(Math.random(), 0.4) * maxR;
        x = Math.cos(theta) * r + rand(-r * 0.1, r * 0.1);
        y = Math.sin(theta) * r * 0.55 + rand(-r * 0.08, r * 0.08);
      } else {
        // Irregular
        x = rand(-maxR, maxR);
        y = rand(-maxR * 0.6, maxR * 0.6);
        const distFromCenter = Math.hypot(x, y);
        if (distFromCenter > maxR) { x *= maxR / distFromCenter * 0.9; y *= maxR / distFromCenter * 0.9; }
        if (Math.random() > (1 - distFromCenter / maxR)) { i--; continue; }
      }

      const size = rand(...st.size);
      const brightness = rand(0.4, 1);
      stars.push({ x: cx + x, y: cy + y, r: size, color: st.color, glow: st.glow, brightness, twinkle: rand(0, Math.PI * 2), twinkleSpeed: rand(0.01, 0.05) });
    }

    // Nebulae
    if (showNebula) {
      const nebulaColors = ['rgba(167,139,250,', 'rgba(96,165,250,', 'rgba(244,114,182,', 'rgba(34,211,238,'];
      for (let i = 0; i < 8; i++) {
        const arm = Math.floor(Math.random() * (arms || 1));
        let r = rand(maxR * 0.15, maxR * 0.85);
        let angle;
        if (arms > 0) {
          angle = arm * (Math.PI * 2 / arms) + r * 0.02 + rand(-0.5, 0.5);
        } else {
          angle = rand(0, Math.PI * 2);
        }
        nebulaPoints.push({
          x: Math.cos(angle) * r,
          y: Math.sin(angle) * r * 0.5,
          radius: rand(maxR * 0.06, maxR * 0.15),
          color: nebulaColors[Math.floor(Math.random() * nebulaColors.length)],
          alpha: rand(0.03, 0.1),
        });
      }
    }
  }

  function render(t) {
    ctx.fillStyle = '#000005';
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.translate(W / 2 + viewX, H / 2 + viewY);
    ctx.scale(viewZoom, viewZoom);

    // Draw nebulae first
    if (showNebula) {
      nebulaPoints.forEach(n => {
        const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius);
        grad.addColorStop(0, n.color + n.alpha + ')');
        grad.addColorStop(1, n.color + '0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(n.x, n.y, n.radius, n.radius * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    // Core glow
    const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.min(W, H) * 0.06);
    coreGrad.addColorStop(0, 'rgba(255,240,200,0.9)');
    coreGrad.addColorStop(0.3, 'rgba(255,200,100,0.4)');
    coreGrad.addColorStop(1, 'rgba(167,139,250,0)');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.ellipse(0, 0, Math.min(W,H) * 0.06, Math.min(W,H) * 0.035, 0, 0, Math.PI * 2);
    ctx.fill();

    // Draw stars
    stars.forEach(s => {
      s.twinkle += s.twinkleSpeed;
      const twinkle = 0.7 + 0.3 * Math.sin(s.twinkle);
      const alpha = s.brightness * twinkle;

      if (s.r > 1.5) {
        ctx.shadowBlur = s.r * 4;
        ctx.shadowColor = s.glow;
      }

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * twinkle, 0, Math.PI * 2);
      ctx.fillStyle = s.color + Math.round(alpha * 255).toString(16).padStart(2,'0');
      ctx.fill();
      ctx.shadowBlur = 0;
    });

    ctx.restore();

    // Subtle vignette
    const vignette = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.3, W/2, H/2, Math.min(W,H)*0.8);
    vignette.addColorStop(0, 'rgba(0,0,0,0)');
    vignette.addColorStop(1, 'rgba(0,0,5,0.6)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, W, H);

    rotation += 0.02;
    document.getElementById('rotDisplay').textContent = Math.round(rotation) % 360 + '°';
  }

  // Controls
  function newGalaxy() {
    generateGalaxy();
  }

  function cycleType() {
    typeIdx = (typeIdx + 1) % types.length;
    galaxyType = types[typeIdx];
    document.getElementById('typeBtn').textContent = galaxyType.charAt(0).toUpperCase() + galaxyType.slice(1);
    generateGalaxy();
  }

  function cycleStars() {
    starCountIdx = (starCountIdx + 1) % starCounts.length;
    starN = starCounts[starCountIdx];
    document.getElementById('starsBtn').textContent = `Stars: ${(starN/1000).toFixed(0)}K`;
    document.getElementById('starCount').textContent = starN.toLocaleString();
    generateGalaxy();
  }

  function toggleNebula() {
    showNebula = !showNebula;
    generateGalaxy();
  }

  function resetView() {
    viewX = 0; viewY = 0; viewZoom = 1;
    document.getElementById('zoomDisplay').textContent = '1.0x';
  }

  // Pan & zoom
  canvas.addEventListener('mousedown', (e) => {
    isDragging = true;
    dragStart = { x: e.clientX - viewX, y: e.clientY - viewY };
    canvas.style.cursor = 'grabbing';
  });
  canvas.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    viewX = e.clientX - dragStart.x;
    viewY = e.clientY - dragStart.y;
  });
  canvas.addEventListener('mouseup', () => { isDragging = false; canvas.style.cursor = 'grab'; });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    viewZoom = Math.max(0.3, Math.min(8, viewZoom * delta));
    document.getElementById('zoomDisplay').textContent = viewZoom.toFixed(1) + 'x';
  }, { passive: false });

  // Resize
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight - 56;
    generateGalaxy();
  }
  window.addEventListener('resize', resize);
  resize();

  // Loop
  let lastT = 0, fpsSmooth = 60;
  function loop(t) {
    const delta = t - lastT; lastT = t;
    const fps = delta > 0 ? 1000 / delta : 60;
    fpsSmooth = fpsSmooth * 0.95 + fps * 0.05;
    if (Math.random() < 0.05) document.getElementById('fps').textContent = Math.round(fpsSmooth);
    render(t);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  </script>
</body>
</html>
