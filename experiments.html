<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiments — NEXUS Lab by RimanTech</title>
  <meta name="description" content="Browse all active NEXUS experiments — particle physics, quantum simulations, generative art, and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;500;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .exp-page-header {
      padding: 140px 80px 60px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .exp-page-header::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(circle, rgba(167,139,250,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 0 80px 48px;
      position: relative;
      z-index: 1;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 8px 20px;
      border-radius: 50px;
      font-family: var(--font-main);
      font-size: 14px;
      cursor: pointer;
      transition: var(--transition);
    }
    .filter-btn:hover, .filter-btn.active {
      background: rgba(167,139,250,0.1);
      border-color: rgba(167,139,250,0.4);
      color: var(--accent-violet);
    }
    .exp-full-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 80px 120px;
      position: relative;
      z-index: 1;
    }
    @media (max-width: 1100px) { .exp-full-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 700px) {
      .exp-full-grid, .filter-bar { padding: 0 24px 80px; }
      .exp-full-grid { grid-template-columns: 1fr; }
      .exp-page-header { padding: 120px 24px 40px; }
    }
    .exp-preview {
      width: 100%;
      height: 160px;
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 20px;
      background: var(--bg-primary);
      position: relative;
    }
    .exp-preview canvas {
      width: 100%;
      height: 100%;
    }
    .exp-number {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: block;
    }
    .exp-difficulty {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .diff-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
    }
    .diff-dot.filled { background: var(--accent-violet); }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <nav class="nav" id="nav">
    <div class="nav-brand">
      <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <span class="nav-logo">⬡</span>
        <span class="nav-name">NEXUS</span>
      </a>
    </div>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">Home</a></li>
      <li><a href="experiments.html" class="nav-link active">Experiments</a></li>
      <li><a href="index.html#visualizer" class="nav-link">Visualizer</a></li>
      <li><a href="index.html#contact" class="nav-link">Contact</a></li>
    </ul>
    <button class="nav-cta" onclick="location.href='index.html#visualizer'">Open Lab →</button>
  </nav>

  <div class="exp-page-header">
    <span class="section-tag">// ALL EXPERIMENTS</span>
    <h1 class="section-title" style="margin-bottom:16px;">
      The <span class="gradient-text">Lab</span> Catalog
    </h1>
    <p class="section-desc">
      48 experiments across physics, AI, generative art, and audio. Filter by category.
    </p>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="physics">Physics</button>
    <button class="filter-btn" data-filter="ai">AI / ML</button>
    <button class="filter-btn" data-filter="generative">Generative</button>
    <button class="filter-btn" data-filter="audio">Audio</button>
    <button class="filter-btn" data-filter="quantum">Quantum</button>
  </div>

  <div class="exp-full-grid" id="expGrid">
    <!-- Cards generated by JS -->
  </div>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <span class="nav-logo">⬡</span>
        <span class="footer-name">NEXUS by RimanTech</span>
      </div>
      <p class="footer-copy">© 2026 RimanTech. Built with passion.</p>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="https://github.com/basseyriman/Experiment" target="_blank">GitHub</a>
      </div>
    </div>
  </footer>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
  <script>
    // Extended experiment catalog
    const EXPERIMENTS = [
      { id: 'e001', title: 'Neural Particle Engine', category: 'ai', icon: '🧠', badge: 'live', desc: 'Self-organizing particles that simulate neural network behavior using physics-based attraction and repulsion forces.', tags: ['WebGL', 'Physics', 'AI'], stat: '2.4M ops/s', difficulty: 3, color: '#a78bfa', key: 'neural' },
      { id: 'e002', title: 'Fluid Dynamics Sim', category: 'physics', icon: '🌊', badge: 'beta', desc: 'Real-time fluid simulation using Navier-Stokes equations rendered entirely in the browser.', tags: ['Canvas 2D', 'Math'], stat: '60 FPS', difficulty: 5, color: '#60a5fa', key: 'fluid' },
      { id: 'e003', title: 'Quantum Wave Visualizer', category: 'quantum', icon: '🔮', badge: 'new', desc: 'Interactive quantum probability wave collapse simulation with beautiful visual feedback.', tags: ['Quantum', 'SVG'], stat: 'Realtime', difficulty: 4, color: '#22d3ee', key: 'quantum' },
      { id: 'e004', title: 'Galaxy Generator', category: 'generative', icon: '🌌', badge: 'stable', desc: 'Procedurally generated spiral galaxies with realistic star distribution and nebula effects.', tags: ['Procedural', '3D'], stat: '10K stars', difficulty: 2, color: '#c084fc', key: 'galaxy' },
      { id: 'e005', title: 'Audio Spectrum', category: 'audio', icon: '🎵', badge: 'live', desc: 'Real-time audio analysis with reactive visual spectrum and beat detection algorithms.', tags: ['Web Audio', 'FFT'], stat: '44.1kHz', difficulty: 3, color: '#f472b6', key: 'audio' },
      { id: 'e006', title: 'Generative Art AI', category: 'ai', icon: '🤖', badge: 'new', desc: 'AI-driven generative art that creates unique masterpieces using evolutionary algorithms.', tags: ['Generative', 'ML'], stat: 'Infinite', difficulty: 4, color: '#34d399', key: 'genart' },
      { id: 'e007', title: 'Gravity Well', category: 'physics', icon: '⚫', badge: 'stable', desc: 'Black hole gravity simulation with gravitational lensing and time dilation effects.', tags: ['Physics', 'GR'], stat: '∞ depth', difficulty: 5, color: '#fbbf24', key: 'neural' },
      { id: 'e008', title: 'Conway\'s Life 3D', category: 'generative', icon: '🔬', badge: 'beta', desc: 'Three-dimensional extension of Conway\'s Game of Life with isometric projection.', tags: ['Cellular', 'Automata'], stat: 'Emergent', difficulty: 3, color: '#fb923c', key: 'genart' },
      { id: 'e009', title: 'Fourier Transform', category: 'audio', icon: '📊', badge: 'stable', desc: 'Draw any path and watch it reconstructed via rotating circles using Fourier series.', tags: ['FFT', 'Math'], stat: 'N circles', difficulty: 4, color: '#60a5fa', key: 'fluid' },
      { id: 'e010', title: 'Mandelbrot Explorer', category: 'generative', icon: '🌀', badge: 'stable', desc: 'GPU-accelerated Mandelbrot set explorer with infinite zoom and color cycling.', tags: ['Fractal', 'GPU'], stat: '∞ zoom', difficulty: 5, color: '#a78bfa', key: 'quantum' },
      { id: 'e011', title: 'Reaction Diffusion', category: 'physics', icon: '🧪', badge: 'live', desc: 'Turing patterns emerge from simple reaction-diffusion equations. Beautiful organic forms.', tags: ['Math', 'Biology'], stat: 'Turing', difficulty: 3, color: '#22d3ee', key: 'genart' },
      { id: 'e012', title: 'Quantum Entanglement', category: 'quantum', icon: '⚛️', badge: 'new', desc: 'Visualize Bell state correlations and quantum teleportation protocols in real time.', tags: ['Quantum', 'Info'], stat: 'Non-local', difficulty: 5, color: '#c084fc', key: 'quantum' },
    ];

    function renderCards(filter = 'all') {
      const grid = document.getElementById('expGrid');
      const filtered = filter === 'all' ? EXPERIMENTS : EXPERIMENTS.filter(e => e.category === filter);

      grid.innerHTML = filtered.map((exp, i) => `
        <div class="exp-card reveal" data-category="${exp.category}" style="transition-delay:${i*0.04}s">
          <div class="exp-card-glow"></div>
          <div class="exp-preview" id="preview-${exp.id}">
            <canvas id="canvas-${exp.id}" width="400" height="160"></canvas>
          </div>
          <span class="exp-number">${exp.id}</span>
          <div class="exp-card-header">
            <span class="exp-icon">${exp.icon}</span>
            <span class="exp-badge ${exp.badge}">${exp.badge.toUpperCase()}</span>
          </div>
          <h3 class="exp-title">${exp.title}</h3>
          <p class="exp-desc">${exp.desc}</p>
          <div class="exp-difficulty">
            ${[1,2,3,4,5].map(d => `<div class="diff-dot${d <= exp.difficulty ? ' filled' : ''}"></div>`).join('')}
            <span style="font-size:11px;color:var(--text-muted);margin-left:8px;font-family:var(--font-mono);">COMPLEXITY</span>
          </div>
          <div class="exp-tags" style="margin-top:12px;">
            ${exp.tags.map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
          <div class="exp-footer">
            <span class="exp-stat">⚡ ${exp.stat}</span>
            <button class="exp-launch" onclick="openModal('${exp.key}')">Launch →</button>
          </div>
        </div>
      `).join('');

      // Re-observe for reveal
      document.querySelectorAll('.reveal').forEach(el => {
        observer.observe(el);
      });

      // Draw mini previews
      setTimeout(() => {
        filtered.forEach(exp => drawMiniPreview(exp));
      }, 100);
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });

    // Draw mini experiment previews
    function drawMiniPreview(exp) {
      const canvas = document.getElementById(`canvas-${exp.id}`);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      let t = 0;

      ctx.fillStyle = '#0a0a12';
      ctx.fillRect(0, 0, w, h);

      function draw() {
        ctx.fillStyle = 'rgba(10,10,18,0.15)';
        ctx.fillRect(0, 0, w, h);
        t += 0.02;

        const N = 30;
        for (let i = 0; i < N; i++) {
          const angle = (i / N) * Math.PI * 2 + t * (0.3 + (exp.id.slice(-1) * 0.1));
          const r = 30 + 20 * Math.sin(t * 2 + i * 0.5);
          const x = w / 2 + Math.cos(angle) * r * 2;
          const y = h / 2 + Math.sin(angle) * r;
          ctx.beginPath();
          ctx.arc(x, y, 2, 0, Math.PI * 2);
          ctx.fillStyle = exp.color + 'aa';
          ctx.fill();
        }

        // Connect some
        ctx.beginPath();
        for (let i = 0; i < N; i += 3) {
          const angle = (i / N) * Math.PI * 2 + t * 0.3;
          const r = 25 + 15 * Math.sin(t + i);
          const x = w / 2 + Math.cos(angle) * r * 2;
          const y = h / 2 + Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.strokeStyle = exp.color + '30';
        ctx.lineWidth = 1;
        ctx.stroke();

        requestAnimationFrame(draw);
      }
      draw();
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCards(btn.dataset.filter);
      });
    });

    renderCards();
  </script>
</body>
</html>
